version: 1
default_rules:
  - Read AGENTS.md and .agents/agentic-delivery/contracts/issue-agent-contract.md before work.
  - Read .agents/agentic-delivery/references/gsd-pi-adapter.md before GSD work.
  - Read .agents/agentic-delivery/references/required-skills-routing.md before implementation, review, CLI, docs, website, design, or connector work.
  - Load and follow gsd-programming-loop through /gsd-programming-loop in Pi or scripts/gsd prompt programming-loop from shell for implementation or behavior-changing work.
  - For Go work, load golang-how-to first, then task-specific Go skills.
  - For CLI work, load golang-cli, golang-testing, golang-error-handling, golang-documentation, and golang-security when user input, credentials, filesystem paths, or external IO are involved.
  - For website/docs UI work, load frontend-design, web-design-guidelines, vercel-react-best-practices, and vercel-composition-patterns as applicable.
  - Use test-first implementation for behavior changes.
  - If the repo-local GSD/Pi adapter is unavailable, record the manual GSD loop fallback and keep TDD evidence.
  - Plan before production edits and keep the GSD plan, TDD ledger, and verification checklist current.
  - For CLI command, flag, output, connector surface, or help-topic changes, follow .agents/agentic-delivery/references/cli-help-docs-website-parity.md.
  - Commit and push coherent green slices to the active issue/PR branch after local green gates.
  - Never push to main; stop only for a human gate or explicit coordinator handoff.
  - Keep PR scope to one primary issue.
  - Stop for human gates before auth, secrets, dependencies, destructive actions, deploys, or gate reductions.
skills:
  github_planning:
    capabilities:
      - issue-first GitHub planning
      - milestones and projects
      - parent issues and sub-issues
      - stacked parent branch PR planning
      - PR linkage
    preferred_local_skills:
      - github-issue-first-delivery
      - gsd-programming-loop
    required_for:
      - github-project-setup
      - issue-roadmap
      - parent-roadmap
      - stacked-pr
      - pr-guardrail
  go_tdd:
    capabilities:
      - idiomatic Go implementation
      - red-green-refactor
      - CLI and validation code
    required_local_skills:
      - gsd-programming-loop
      - golang-how-to
      - golang-testing
    preferred_local_skills:
      - golang-cli
      - golang-error-handling
      - golang-security
      - golang-safety
      - golang-documentation
      - go-engineering
    required_for:
      - guardrail-go
      - cli-runner
      - validator
      - protocol-engine
  api_architecture:
    capabilities:
      - API taxonomy
      - REST and GraphQL modeling
      - safe execution models
      - connector runtime design
      - operation classification
    required_local_skills:
      - golang-how-to
      - golang-design-patterns
      - golang-structs-interfaces
      - golang-security
    preferred_local_skills:
      - golang-naming
      - golang-error-handling
      - golang-safety
      - golang-graphql
      - golang-database
      - api-design-principles
      - architecture-patterns
      - go-engineering
    required_for:
      - operation-ledger
      - direct-read
      - graphql
      - xml-envelope
  security_review:
    capabilities:
      - secret handling
      - destructive action gates
      - approval boundaries
      - command argument and path safety
    required_local_skills:
      - golang-how-to
      - golang-security
      - golang-safety
    preferred_local_skills:
      - golang-error-handling
      - golang-lint
      - go-engineering
      - stride-analysis-patterns
      - threat-mitigation-mapping
    required_for:
      - sensitive-admin
      - raw-api
      - reverse-etl
  review_disposition:
    capabilities:
      - CodeRabbit automatic/manual review mode selection
      - Copilot backup review routing when CodeRabbit is blocked
      - review comment triage
      - disposition replies
      - follow-up issue routing
      - Go/security/design review skill loading
    required_local_skills:
      - golang-how-to
      - golang-security
      - golang-testing
    preferred_local_skills:
      - github-issue-first-delivery
      - gsd-code-review
      - golang-lint
      - golang-error-handling
      - web-design-guidelines
      - go-engineering
    required_for:
      - cli-surface
      - coderabbit-review
      - automated-review-routing
      - parent-roadmap
      - stacked-pr
      - parent-orchestration
  orchestration:
    capabilities:
      - parent issue state machine ownership
      - Codex subagent task decomposition
      - worker write-scope isolation
      - sub-PR merge arbitration
      - parent PR automated review coverage routing
      - human gate escalation
      - required skill routing for workers
    preferred_local_skills:
      - github-issue-first-delivery
      - gsd-programming-loop
      - gsd-plan-phase
      - gsd-code-review
      - golang-how-to
      - web-design-guidelines
    required_for:
