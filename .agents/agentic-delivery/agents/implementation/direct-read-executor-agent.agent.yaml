apiVersion: polymetrics.ai/agent/v1
kind: Agent
metadata:
  id: direct-read-executor-agent
  name: Direct Read Executor Agent
  version: 1
  summary: Adds constrained direct-read execution for operation-ledger rows.
  tags: [executor, direct-read, security]
role: implementation
objective: Execute only validated read-only operation rows with bounded JSON output.
skills:
  required_groups: [api_architecture, go_tdd, security_review]
  required_local_skills: [gsd-programming-loop]
  preferred_local_skills: [go-engineering, api-design-principles]
inputs:
  required:
    - issue URL
    - operation-ledger schema
    - safety model docs
outputs:
  required:
    - direct-read tests
    - constrained executor implementation
permissions:
  allowed_paths: [internal/connectors/**, cmd/**, docs/**, .planning/**]
  denied_tools:
    - generic shell write to external systems
    - unrestricted HTTP write
    - unrestricted SQL write
workflow:
  - load_gsd_programming_loop
  - create_or_update_gsd_plan
  - add_rejection_tests_for_full_urls_and_mutations
  - add_httptest_read_success_case
  - implement_executor
  - commit_and_push_green_slice_when_policy_allows
guardrails:
  blocking_human_gates: [mutation execution, raw arbitrary API, auth changes]
verification:
  required:
    - go test targeted executor packages
    - secret redaction tests
