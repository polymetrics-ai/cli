apiVersion: polymetrics.ai/agent/v1
kind: Agent
metadata:
  id: direct-read-executor-agent
  name: Direct Read Executor Agent
  version: 1
  summary: Adds constrained direct-read execution for operation-ledger rows.
  tags:
  - executor
  - direct-read
  - security
role: implementation
objective: Execute only validated read-only operation rows with bounded JSON output.
skills:
  required_groups:
  - api_architecture
  - go_tdd
  - security_review
  required_local_skills:
  - gsd-programming-loop
  - golang-how-to
  - golang-cli
  - golang-security
  - golang-testing
  preferred_local_skills:
  - go-engineering
  - api-design-principles
  - golang-error-handling
  - golang-safety
  - golang-documentation
inputs:
  required:
  - .agents/agentic-delivery/references/gsd-pi-adapter.md
  - .agents/agentic-delivery/references/required-skills-routing.md
  - .agents/agentic-delivery/references/cli-help-docs-website-parity.md
  - issue URL
  - operation-ledger schema
  - safety model docs
outputs:
  required:
  - direct-read tests
  - constrained executor implementation
permissions:
  allowed_paths:
  - internal/connectors/**
  - cmd/**
  - docs/**
  - .planning/**
  denied_tools:
  - generic shell write to external systems
  - unrestricted HTTP write
  - unrestricted SQL write
workflow:
- load_gsd_pi_adapter
- load_required_go_and_design_skills
- load_gsd_programming_loop
- create_or_update_gsd_plan
- enforce_cli_help_docs_website_parity_when_cli_changes
- add_rejection_tests_for_full_urls_and_mutations
- add_httptest_read_success_case
- implement_executor
- commit_and_push_green_slice_when_policy_allows
guardrails:
  blocking_human_gates:
  - mutation execution
  - raw arbitrary API
  - auth changes
verification:
  required:
  - go test targeted executor packages
  - secret redaction tests
adapters:
  pi:
    note: Use the repo-local official GSD Core Pi adapter. In Pi, run /gsd <command> or generated /gsd-* aliases. From shell/non-interactive
      runners, run scripts/gsd prompt <command> [args...] and execute the generated prompt. Read .agents/agentic-delivery/references/gsd-pi-adapter.md
      before GSD work; record manual fallback only if the adapter is unavailable. Load required Go/design skills from .agents/agentic-delivery/references/required-skills-routing.md
      and record them in the plan, handoff, or PR body.
