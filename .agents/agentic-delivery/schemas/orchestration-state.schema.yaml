apiVersion: polymetrics.ai/orchestration-state/v1
kind: OrchestrationStateSchema
description: Machine-readable state ledger shape for parent issue orchestration.
required_fields:
  - parent_issue
  - parent_branch
  - parent_pr
  - default_branch
  - orchestrator
  - ready_queue
  - spawn_decisions
  - subissues
  - human_gates
  - updated_at
field_contract:
  parent_issue:
    type: object
    required: [number, url, title, state]
  parent_branch:
    type: string
    example: feat/44-github-cli-parity
  parent_pr:
    type: object
    required: [url, base, head, draft, state]
  default_branch:
    type: string
    example: main
  orchestrator:
    type: object
    required: [mode, runtime, status]
    mode_values: [active_owner, advisory, blocked]
    status_values: [running, waiting_for_workers, waiting_for_review, blocked, human_ready]
  ready_queue:
    type: list
    item_required: [number, status, dependencies, write_scope, decision]
    decision_values:
      - spawned
      - not_spawned_dependency_blocked
      - not_spawned_write_scope_collision
      - not_spawned_human_gate
      - not_spawned_runtime_capability_missing
      - not_spawned_review_blocked
      - not_spawned_verification_blocked
  spawn_decisions:
    type: list
    item_required: [timestamp, decision, issue_numbers, reason]
  subissues:
    type: list
    item_required:
      - number
      - url
      - branch
      - pr_url
      - worker
      - status
      - write_scope
      - verification
      - automated_review
  subissue_status_values:
    - planned
    - worker_ready
    - worker_in_progress
    - sub_pr_open
    - sub_pr_green
    - sub_pr_reviewed
    - provisionally_integrated
    - parent_review_pending
    - parent_review_clean
    - blocked
    - complete
  automated_review:
    type: object
    required:
      - primary_route
      - status
      - head_sha
      - reviewed_range
      - coverage_route
      - fallback_route
      - disposition_summary
      - disposition_url
    primary_route_values: [coderabbit_auto, coderabbit_auto_incremental, coderabbit_manual_fallback, copilot_backup, human, blocked]
    fallback_route_values: [copilot_backup, human, none]
    coverage_route_values: [sub_pr, parent_pr_fallback, copilot_backup, blocked]
    status_values: [pending, clean, comments_addressed, skipped, blocked]
  coderabbit:
    deprecated_alias_for: automated_review
  human_gates:
    type: list
    examples:
      - parent PR merge to main
      - auth scope changes
      - new dependencies
      - destructive external actions
  updated_at:
    type: RFC3339 timestamp
