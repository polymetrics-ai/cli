apiVersion: polymetrics.ai/orchestration-state/v1
kind: OrchestrationStateSchema
description: Machine-readable state ledger shape for parent issue orchestration.
schema_versions:
  canonical_v2:
    write_default: true
    required_additions: [correction_budget]
  legacy_v1:
    read_only: true
    detection: missing schema_version or legacy review fields
    rule: preserve truthful historical records; do not rewrite them into canonical evidence
required_fields:
  - parent_issue
  - parent_branch
  - parent_pr
  - default_branch
  - orchestrator
  - ready_queue
  - spawn_decisions
  - subissues
  - human_gates
  - updated_at
field_contract:
  parent_issue:
    type: object
    required: [number, url, title, state]
  parent_branch:
    type: string
    example: feat/44-github-cli-parity
  parent_pr:
    type: object
    required: [url, base, head, draft, state]
  default_branch:
    type: string
    example: main
  orchestrator:
    type: object
    required: [mode, runtime, status]
    mode_values: [active_owner, advisory, blocked]
    mode_rules:
      - active_owner is required for executable parent issue orchestration when worker runtime is available.
      - advisory is allowed only for read-only audits, planning reviews, or explicit human-requested analysis mode.
    status_values: [running, waiting_for_workers, waiting_for_review, blocked, human_ready]
  ready_queue:
    type: list
    item_required: [number, status, dependencies, write_scope, decision]
    decision_values:
      - spawned
      - read_only_spawned
      - local_critical_path
      - not_spawned_dependency_blocked
      - not_spawned_write_scope_collision
      - not_spawned_human_gate
      - not_spawned_isolation_missing
      - not_spawned_runtime_capability_missing
      - not_spawned_review_blocked
      - not_spawned_verification_blocked
  spawn_decisions:
    type: list
    item_required: [timestamp, decision, issue_numbers, reason]
  correction_budget:
    type: object
    canonical_v2_required: true
    required: [max_correction_rounds, rounds_by_range]
    max_correction_rounds:
      type: positive integer
      default: 4
    rounds_by_range:
      type: map
      key: exact base SHA plus stable candidate lineage identifier
      value: non-negative integer
    lineage_invariant: created once for the first candidate and retained across changed heads or replacement PRs
    lineage_head_history: append-only exact head SHAs for the stable candidate lineage
    legacy_input: guards.correction_rounds may be read once and mapped forward but must not be written by canonical_v2
    exceeded_transition: blocked human gate with outstanding findings
  subissues:
    type: list
    item_required:
      - number
      - url
      - branch
      - pr_url
      - worker
      - status
      - write_scope
      - worker_directory
      - verification
      - automated_review
  subissue_status_values:
    - planned
    - worker_ready
    - worker_in_progress
    - sub_pr_open
    - sub_pr_green
    - sub_pr_reviewed
    - provisionally_integrated
    - parent_review_pending
    - parent_review_clean
    - blocked
    - complete
  automated_review:
    type: object
    canonical_name: review_coverage
    canonical_v2:
      required:
        - primary_route
        - status
        - exact_base_sha
        - exact_head_sha
        - reviewed_range
        - disposition_summary
        - local_codex
        - shepherd
      primary_route_values: [local_codex, human, blocked]
      status_values: [pending, findings_correction_required, clean, comments_addressed, blocked]
      finding_disposition_values: [accepted, accepted_with_modification, declined, duplicate, deferred, needs_human]
      local_codex:
        required: [reviewer_identity, fresh_context, exact_base_sha, exact_head_sha, status, findings_artifact]
        status_values: [pending, findings_correction_required, clean, comments_addressed, blocked]
      shepherd:
        required: [status, exact_head_sha, evidence_artifact]
        status_values: [pending, proceed, retry, revert, halt, blocked]
        verdict_values: [PROCEED, RETRY, REVERT, HALT]
        verdict_required_when: [proceed, retry, revert, halt]
        verdict_must_be_absent_when: [pending, blocked]
    legacy_review_route:
      read_only: true
      inference: any pre-canonical record without schema_version or canonical_v2 fields
      purpose: preserve truthful historical review records; never write these values for current PM coverage
      github_bot_v1:
        primary_route_values: [claude_auto, claude_manual, claude_manual_fallback, copilot_backup, human, blocked]
        fallback_route_values: [copilot_backup, human, none]
        coverage_route_values: [sub_pr, parent_pr_fallback, copilot_backup, blocked]
      legacy_local_codex_v1:
        accepted_fields: [status, head_sha, reviewed_range, reviewer, findings, disposition_summary]
        status_values: [pending, clean, comments_addressed, complete_no_unresolved_findings, skipped, blocked]
  claude:
    deprecated_alias_for: automated_review.legacy_review_route.github_bot_v1
  run_terminal_contract:
    canonical_schema_version: canonical_v2
    terminal_values: [human_gate, done, blocked, budget]
    human_gate_kind_values: [parent_ready, correction_cap_exceeded]
    human_gate_kind_required_when: terminal is human_gate
    correction_cap_transition: terminal human_gate plus human_gate_kind correction_cap_exceeded
    missing_kind_transition: blocked human decision for canonical_v2; empty kind is readable only as legacy input
  human_gates:
    type: list
    examples:
      - parent PR merge to main
      - auth scope changes
      - new dependencies
      - destructive external actions
  updated_at:
    type: RFC3339 timestamp
