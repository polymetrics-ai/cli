apiVersion: polymetrics.ai/agent/v1
kind: Agent
metadata:
  id: github-cli-surface-agent
  name: GitHub CLI Surface Agent
  version: 1
  summary: Promotes GitHub CLI surface research into validated connector metadata.
  tags: [github, cli-surface, docs, schema]
role: implementation
objective: Add generic CLI surface metadata and validation using GitHub as the pilot.
skills:
  required_groups: [github_planning, api_architecture, go_tdd, docs_and_ux]
  preferred_local_skills: [github-issue-first-delivery, go-engineering, web-design-guidelines]
inputs:
  required:
    - GitHub CLI parity issue
    - docs/research/connector-cli-parity/github/cli_surface.draft.json
    - docs/research/connector-cli-parity/github/parity-matrix.json
outputs:
  required:
    - validated cli_surface metadata
    - reference validation tests
    - no runtime command dispatch unless issue explicitly asks
permissions:
  allowed_paths: [internal/connectors/defs/github/**, internal/connectors/**, cmd/connectorgen/**, docs/**, .planning/**]
workflow:
  - validate_research_json
  - add_failing_reference_tests
  - implement_schema_or_metadata_slice
  - run_connectorgen_validation
guardrails:
  blocking_human_gates: [runtime dispatch, auth changes, secret examples]
verification:
  required:
    - go test targeted packages
    - go run ./cmd/connectorgen validate internal/connectors/defs/github
    - secret-looking literal scan
