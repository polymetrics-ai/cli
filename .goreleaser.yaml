version: 2

project_name: pm

metadata:
  mod_timestamp: "{{ .CommitTimestamp }}"

release:
  mode: keep-existing
  replace_existing_artifacts: true

builds:
  - id: pm
    main: ./cmd/pm
    binary: pm
    env:
      - CGO_ENABLED=0
    mod_timestamp: "{{ .CommitTimestamp }}"
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X polymetrics.ai/internal/cli.version={{ .Version }}
      - -X polymetrics.ai/internal/cli.commit={{ .Commit }}
      - -X polymetrics.ai/internal/cli.buildDate={{ .CommitDate }}

archives:
  - id: pm
    ids:
      - pm
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - NOTICE
      - README.md

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs"
      - "^test"
      - "^chore"
      - "^style"
      - "^ci"
