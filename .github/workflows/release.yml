name: Release

on:
  push:
    branches:
      - main
  pull_request:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-please:
    name: release-please
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}

    steps:
      - name: Create or update release PR
        id: release
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  package-check:
    name: package-check
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout candidate
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.12'
          cache: true

      - name: Build snapshot release assets
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --snapshot --clean

      - name: Verify release assets
        run: ./scripts/verify-release-assets.sh dist

  release-assets:
    name: release-assets
    needs: release-please
    if: >-
      ${{
        always() &&
        (github.event_name == 'release' ||
         needs.release-please.outputs.release_created == 'true')
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: release-assets-${{ github.event.release.tag_name || needs.release-please.outputs.tag_name }}
      cancel-in-progress: false

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.release.tag_name || needs.release-please.outputs.tag_name }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.12'
          cache: true

      - name: Build release assets without publishing
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --skip=publish

      - name: Verify release assets
        run: ./scripts/verify-release-assets.sh dist

      - name: Upload verified assets to published release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.event.release.tag_name || needs.release-please.outputs.tag_name }}
        run: |
          set -euo pipefail
          published_tag=$(gh release view "$TAG_NAME" --json isDraft,tagName --jq 'select(.isDraft == false) | .tagName')
          test "$published_tag" = "$TAG_NAME"
          assets=(
            dist/pm_*_darwin_amd64.tar.gz
            dist/pm_*_darwin_arm64.tar.gz
            dist/pm_*_linux_amd64.tar.gz
            dist/pm_*_linux_arm64.tar.gz
            dist/pm_*_windows_amd64.zip
            dist/pm_*_windows_arm64.zip
            dist/checksums.txt
          )
          gh release upload "$TAG_NAME" "${assets[@]}" --clobber
