name: Claude Code Review

# On-demand, context-aware code review by Claude.
# Complements CodeRabbit (primary auto-review) — this runs ONLY when a maintainer
# or trusted collaborator explicitly asks for it by mentioning @claude on a PR.
#
# Security model (public repo — defense in depth):
#   Layer 1  if:  author-trust gate below stops the job before the runner ever
#                 sees the auth secret. This is the control that actually protects
#                 the token; do NOT remove it.
#   Layer 2  the action independently re-checks the commenter's write access.
#   Layer 3  bots are blocked by default (allowed_bots unset).
#
# By default the review is STATIC (Claude reads the code + diff; it does NOT
# execute the PR's build/tests, because on a public repo the PR head is
# untrusted code that could exfiltrate the auth token). See the note at the
# bottom for how to safely enable `go build/vet/test` for trusted-author PRs.
#
# Auth: uses a Claude Pro/Max subscription via CLAUDE_CODE_OAUTH_TOKEN.
# Generate locally with `claude setup-token`, then add it as a repo secret.
# To use pay-per-token API billing instead, replace the auth line in the step
# below with:  anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

concurrency:
  group: claude-review-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    # LAYER 1 — author-trust gate. Only PR comments from OWNER/MEMBER/COLLABORATOR
    # that mention @claude may start this job.
    if: |
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request != null &&
        contains(github.event.comment.body, '@claude') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
      ) || (
        github.event_name == 'pull_request_review_comment' &&
        contains(github.event.comment.body, '@claude') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
      )
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout base repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0   # full history so Claude can diff the PR against main

      - name: Set up Go (for read-only inspection / go vet)
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Claude review
        uses: anthropics/claude-code-action@v1
        with:
          # Subscription auth (Pro/Max) — no per-token API billing.
          # Generate with `claude setup-token` and store as the CLAUDE_CODE_OAUTH_TOKEN
          # repo secret. To use pay-per-token billing instead, swap this line for:
          #   anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # No `prompt:` — Claude responds to the maintainer's @claude comment,
          # so "@claude review the DuckDB error handling" works naturally.
          # The rubric is injected as a system prompt so every review is consistent.
          claude_args: |
            --model claude-sonnet-5
            --max-turns 20
            --append-system-prompt "You are the code reviewer for polymetrics-ai/cli, a Go local-first data CLI (ETL, embedded DuckDB SQL, reverse ETL, connectors). Before reviewing, read CLAUDE.md, AGENTS.md, the relevant files in .agents/, and CONTRIBUTING.md to load project conventions, then read the changed files and surrounding packages to understand context — do not review the diff in isolation. Follow .github/claude-review-rubric.md. Post code-specific issues as INLINE comments via mcp__github_inline_comment__create_inline_comment (confirmed:true) and one concise top-level summary via 'gh pr comment'. Do not run the PR's build or tests. Do not emit review text as chat messages — only as GitHub comments. Be specific, cite file:line, and prefer high-signal findings over nitpicks CodeRabbit already covers."
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr comment:*),Bash(gh api:*),Bash(go vet ./...),Bash(golangci-lint run:*),Read,Grep,Glob,LS"

# ─────────────────────────────────────────────────────────────────────────────
# OPTIONAL UPGRADE — let Claude compile/test the code (higher signal, higher risk)
#
# `go build`/`go test` execute PR code. On a PUBLIC repo that means untrusted
# code could read the auth token from the runner env. Only enable for PRs whose
# HEAD is trusted. Add a second job guarded by the PR author's association:
#
#   if: contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'),
#               github.event.issue.author_association)   # PR author, not commenter
#
# and add Bash(go build ./...),Bash(go test:*),Bash(make verify-parallel) to
# --allowedTools. For untrusted PRs, keep the static job above, or run the build
# job on a hardened/sandboxed runner (e.g. StepSecurity Harden-Runner with egress
# filtering) so a leaked token cannot be exfiltrated.
# ─────────────────────────────────────────────────────────────────────────────
