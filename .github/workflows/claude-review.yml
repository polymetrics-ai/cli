name: Claude Code Review

# Claude is the primary code reviewer for this repo. Two ways it runs:
#
#   1. AUTO   — when a trusted author (owner/member/collaborator/contributor)
#               opens/reopens/marks-ready a PR, Claude reviews it automatically.
#   2. ON-DEMAND — anyone with write access can also invoke a fresh/targeted
#               review by commenting `@claude ...` on a PR.
#
# Security model (public repo — defense in depth):
#   Layer 1  if:  author-trust gate on each job stops it before the runner ever
#                 sees the auth secret. This is the control that actually protects
#                 the token; do NOT remove it.
#   Layer 2  the action independently re-checks permissions.
#   Layer 3  bots are blocked by default (allowed_bots unset).
#
# Reviews are STATIC (Claude reads the code + diff; it does NOT execute the PR's
# build/tests, because on a public repo the PR head is untrusted code that could
# exfiltrate the auth token). See the note at the bottom to safely enable
# `go build/vet/test` for trusted-author PRs.
#
# Auth: Claude Pro/Max subscription via CLAUDE_CODE_OAUTH_TOKEN.
# Generate locally with `claude setup-token`, then add it as a repo secret.
# To use pay-per-token API billing instead, replace each auth line below with:
#   anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

on:
  # AUTO-review triggers (deliberately NOT `synchronize` — re-reviewing every
  # push would burn the subscription quota; add it if you want per-push reviews).
  pull_request:
    types: [opened, reopened, ready_for_review]
  # ON-DEMAND triggers
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

concurrency:
  # Keyed per PR. cancel-in-progress MUST stay false: this workflow triggers on every comment
  # event, and a review posts many comments (inline + summary), as do the agent's disposition
  # replies. With cancel-in-progress: true, each of those comment events spawns a run that lands
  # in this same group and CANCELS the in-progress review before it can finish — so the review
  # effectively cancels itself the moment it starts commenting. false lets the running review
  # complete; the non-@claude comment runs just queue behind it and no-op via the job `if:` gate.
  group: claude-review-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: false

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # AUTO-REVIEW: runs when a trusted author opens a PR.
  # Gate = PR author association. "contributor or owners" per project policy.
  # ───────────────────────────────────────────────────────────────────────────
  auto-review:
    if: |
      github.event_name == 'pull_request' &&
      github.event.pull_request.draft == false &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR","CONTRIBUTOR"]'), github.event.pull_request.author_association)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout base repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go (for read-only inspection / go vet)
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Claude auto review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}
            You are the primary reviewer for this pull request. Perform a thorough,
            context-aware review following .github/claude-review-rubric.md.
            The base branch is checked out; use `gh pr diff` to see the change.
            Do NOT run the PR's build or tests. Post code-specific issues as INLINE
            comments (mcp__github_inline_comment__create_inline_comment, confirmed:true)
            and ONE concise top-level summary via `gh pr comment`. Only output GitHub
            comments — no chat messages.
          claude_args: |
            --model claude-sonnet-5
            --max-turns 25
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr comment:*),Bash(gh api:*),Bash(go vet ./...),Bash(golangci-lint run:*),Read,Grep,Glob,LS"

  # ───────────────────────────────────────────────────────────────────────────
  # ON-DEMAND: `@claude ...` comment from a write-access user (owner/member/collab).
  # ───────────────────────────────────────────────────────────────────────────
  on-demand-review:
    if: |
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request != null &&
        contains(github.event.comment.body, '@claude') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
      ) || (
        github.event_name == 'pull_request_review_comment' &&
        contains(github.event.comment.body, '@claude') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
      )
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout base repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go (for read-only inspection / go vet)
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Claude on-demand review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # No `prompt:` — Claude responds to the maintainer's @claude comment,
          # so "@claude review the DuckDB error handling" works naturally.
          # The rubric is injected as a system prompt for consistency.
          claude_args: |
            --model claude-sonnet-5
            --max-turns 20
            --append-system-prompt "You are the primary code reviewer for polymetrics-ai/cli, a Go local-first data CLI (ETL, embedded DuckDB SQL, reverse ETL, connectors). Before reviewing, read CLAUDE.md, AGENTS.md, the relevant files in .agents/, and CONTRIBUTING.md to load project conventions, then read the changed files and surrounding packages — do not review the diff in isolation. Follow .github/claude-review-rubric.md. Post code-specific issues as INLINE comments via mcp__github_inline_comment__create_inline_comment (confirmed:true) and one concise top-level summary via 'gh pr comment'. Do not run the PR's build or tests. Only output GitHub comments, never chat messages. Be specific and cite file:line."
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr comment:*),Bash(gh api:*),Bash(go vet ./...),Bash(golangci-lint run:*),Read,Grep,Glob,LS"

# ─────────────────────────────────────────────────────────────────────────────
# OPTIONAL UPGRADE — let Claude compile/test the code (higher signal, higher risk)
#
# `go build`/`go test` execute PR code. On a PUBLIC repo untrusted code could read
# the auth token from the runner env. Only enable for PRs whose HEAD is trusted:
# tighten the auto-review gate to OWNER/MEMBER/COLLABORATOR (drop CONTRIBUTOR) and
# add Bash(go build ./...),Bash(go test:*),Bash(make verify-parallel) to
# --allowedTools. For untrusted PRs keep the static review, or run the build job
# on a hardened/sandboxed runner (e.g. StepSecurity Harden-Runner with egress
# filtering) so a leaked token cannot be exfiltrated.
# ─────────────────────────────────────────────────────────────────────────────
