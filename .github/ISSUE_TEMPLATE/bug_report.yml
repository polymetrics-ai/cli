name: Bug report
description: Report a reproducible problem in Polymetrics CLI.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Provide commands, inputs, and any relevant output with secrets removed.
      placeholder: |
        1. Run `pm ...`
        2. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Output from `pm --version`, commit SHA, or branch.
  - type: input
    id: os
    attributes:
      label: OS and architecture
      placeholder: macOS arm64, Linux amd64, Windows amd64
  - type: checkboxes
    id: safety
    attributes:
      label: Safety
      options:
        - label: I removed credentials, tokens, private URLs, and customer data.
          required: true
