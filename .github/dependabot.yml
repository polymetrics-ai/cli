version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - go
    open-pull-requests-limit: 10
    groups:
      go-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /website
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - website
    open-pull-requests-limit: 10
    groups:
      website-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /build/agent
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - agent
    open-pull-requests-limit: 5
    groups:
      agent-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - ci
    groups:
      actions:
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: /website
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - docker
