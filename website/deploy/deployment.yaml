apiVersion: apps/v1
kind: Deployment
metadata:
  name: polymetrics-website
  namespace: polymetrics-website
  labels:
    app: polymetrics-website
spec:
  replicas: 1
  selector:
    matchLabels:
      app: polymetrics-website
  template:
    metadata:
      labels:
        app: polymetrics-website
    spec:
      containers:
        - name: website
          image: localhost/polymetrics-website:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: "0.0.0.0"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 15
